name: Publish to npm with Auto Version Bump

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          registry-url: 'https://registry.npmjs.org'

      - name: ⚙️ Mevcut Versiyonu Oku
        id: version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "Mevcut Versiyon: $CURRENT_VERSION"
          echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT

      - name: 🔢 Yeni Versiyonu Hesapla
        id: bump
        run: |
          CURRENT=${{ steps.version.outputs.current }}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          if [ "$PATCH" -lt 9 ]; then
            NEW_PATCH=$((PATCH + 1))
            NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          elif [ "$MINOR" -lt 9 ]; then
            NEW_MINOR=$((MINOR + 1))
            NEW_VERSION="$MAJOR.$NEW_MINOR.0"
          else
            NEW_MAJOR=$((MAJOR + 1))
            NEW_VERSION="$NEW_MAJOR.0.0"
          fi

          echo "Yeni Versiyon: $NEW_VERSION"
          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: ✏️ Versiyonu Güncelle ve Commit'le
        run: |
          npm version ${{ steps.bump.outputs.new }} --no-git-tag-version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "ci: versiyon ${{ steps.bump.outputs.new }} olarak güncellendi [skip ci]" || echo "Versiyon değişmedi"

      - name: 🚀 NPM'e Publish Et
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
