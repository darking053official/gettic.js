name: 🚀 Otomatik Sürüm ve NPM Yayını

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  auto-version-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          registry-url: 'https://registry.npmjs.org'

      - name: ⚙️ Mevcut Versiyonu Oku
        id: version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "Mevcut Versiyon: $CURRENT_VERSION"
          echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT

      - name: 🔢 Yeni Versiyonu Hesapla
        id: bump
        run: |
          CURRENT=${{ steps.version.outputs.current }}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          if [ "$PATCH" -lt 9 ]; then
            NEW_PATCH=$((PATCH + 1))
            NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          elif [ "$MINOR" -lt 9 ]; then
            NEW_MINOR=$((MINOR + 1))
            NEW_VERSION="$MAJOR.$NEW_MINOR.0"
          else
            NEW_MAJOR=$((MAJOR + 1))
            NEW_VERSION="$NEW_MAJOR.0.0"
          fi

          echo "Yeni Versiyon: $NEW_VERSION"
          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: ✏️ Versiyonu Güncelle ve Commit'le
        run: |
          npm version ${{ steps.bump.outputs.new }} --no-git-tag-version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "ci: versiyon ${{ steps.bump.outputs.new }} olarak güncellendi [skip ci]" || echo "Versiyon değişmedi"

      - name: 🏷️ Git Tag Oluştur
        run: |
          git tag -a "v${{ steps.bump.outputs.new }}" -m "Sürüm v${{ steps.bump.outputs.new }}"
          git push origin "v${{ steps.bump.outputs.new }}"

      - name: 📦 GitHub Release Oluştur
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.bump.outputs.new }}"
          name: "🚀 Sürüm v${{ steps.bump.outputs.new }}"
          body: |
            ## 🚀 Gettic.js v${{ steps.bump.outputs.new }}

            ### ✨ Yenilikler
            - Otomatik sürüm güncellemesi
            - Performans iyileştirmeleri
            
            ### 📦 Kurulum
            ```bash
            npm install gettic.js@${{ steps.bump.outputs.new }}
            ```
            
            ### 🔗 Bağlantılar
            - [NPM](https://www.npmjs.com/package/gettic.js)
            - [GitHub](https://github.com/darking053official/gettic.js)
          draft: false
          prerelease: false
          generate_release_notes: true

      - name: 🚀 NPM'e Yayınla
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
